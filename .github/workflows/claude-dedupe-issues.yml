name: Claude Issue Dedupe

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to check for duplicates'
        required: true
        type: string

jobs:
  dedupe:
    uses: opensearch-project/opensearch-build/.github/workflows/issue-dedupe.yml@main
    permissions:
      contents: read
      issues: write
      id-token: write
    secrets:
      BEDROCK_ACCESS_ROLE: ${{ secrets.BEDROCK_ACCESS_ROLE }}
    with:
      mode: 'detect'
      issue_number: ${{ github.event.issue.number || inputs.issue_number }}
      dedupe_prompt: '/dedupe ${{ github.repository }}/issues/${{ github.event.issue.number || inputs.issue_number }}'
