calcite:
  logical: |
    LogicalSystemLimit(sort0=[$0], dir0=[ASC], fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalSort(sort0=[$0], dir0=[ASC])
        LogicalAggregate(group=[{0}], avg(balance)=[AVG($1)])
          LogicalProject(gender=[$4], balance0=[CAST($7):DOUBLE])
            LogicalFilter(condition=[AND(IS NOT NULL($4), IS NOT NULL($7))])
              CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableSort(sort0=[$0], dir0=[ASC])
        EnumerableCalc(expr#0..2=[{inputs}], expr#3=[0], expr#4=[=($t2, $t3)], expr#5=[null:DOUBLE], expr#6=[CASE($t4, $t5, $t1)], expr#7=[/($t6, $t2)], gender=[$t0], avg(balance)=[$t7])
          EnumerableAggregate(group=[{0}], agg#0=[$SUM0($1)], agg#1=[COUNT($1)])
            EnumerableCalc(expr#0..18=[{inputs}], expr#19=[CAST($t7):DOUBLE], expr#20=[IS NOT NULL($t4)], expr#21=[IS NOT NULL($t7)], expr#22=[AND($t20, $t21)], gender=[$t4], balance0=[$t19], $condition=[$t22])
              CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
