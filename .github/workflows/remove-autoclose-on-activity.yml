name: Remove autoclose label on activity

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  remove-autoclose:
    if: |
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'autoclose') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Remove autoclose label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.issue.number;
            const commenter = context.payload.comment.user.login;

            console.log(`Removing autoclose label from issue #${issueNumber} due to comment from ${commenter}`);

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issueNumber,
                name: 'autoclose',
              });
              console.log(`Successfully removed autoclose label from issue #${issueNumber}`);
            } catch (error) {
              if (error.status === 404) {
                console.log(`autoclose label was already removed from issue #${issueNumber}`);
              } else {
                throw error;
              }
            }
