task integJdbcTest(type: RestIntegTestTask) {
    testClusters.findAll {c -> c.clusterName == "integJdbcTest"}.first().with {
        plugin ":opensearch-sql-plugin"
    }

    useJUnitPlatform()
    dependsOn ':opensearch-sql-plugin:bundlePlugin'
    testLogging {
        events "passed", "skipped", "failed"
    }
    afterTest { desc, result ->
        logger.quiet "${desc.className}.${desc.name}: ${result.resultType} ${(result.getEndTime() - result.getStartTime())/1000}s"
    }

    if (System.getProperty("jdbcDriverVersion") != null) {
        systemProperty "jdbcDriverVersion", System.getProperty("jdbcDriverVersion")
    }

    if (System.getProperty("jdbcFile") != null) {
        systemProperty "jdbcFile", System.getProperty("jdbcFile")
    }

    systemProperty 'tests.security.manager', 'false'
    systemProperty('project.root', project.projectDir.absolutePath)

    systemProperty "https", System.getProperty("https")
    systemProperty "user", System.getProperty("user")
    systemProperty "password", System.getProperty("password")

    // Set default query size limit
    systemProperty 'defaultQuerySizeLimit', '10000'

    // Tell the test JVM if the cluster JVM is running under a debugger so that tests can use longer timeouts for
    // requests. The 'doFirst' delays reading the debug setting on the cluster till execution time.
    doFirst { systemProperty 'cluster.debug', getDebug() }

    if (System.getProperty("test.debug") != null) {
        jvmArgs '-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005'
    }

    filter {
        includeTestsMatching 'org.opensearch.sql.jdbc.*'
    }
}

task integTestWithSecurity(type: RestIntegTestTask) {
    useCluster testClusters.integTestWithSecurity
    useCluster testClusters.remoteIntegTestWithSecurity

    systemProperty "cluster.names",
        getClusters().stream().map(cluster -> cluster.getName()).collect(Collectors.joining(","))

    getClusters().forEach { cluster ->
        configureSecurityPlugin(cluster)
    }

    dependsOn ':opensearch-sql-plugin:bundlePlugin'
    testLogging {
        events "passed", "skipped", "failed"
    }
    afterTest { desc, result ->
        logger.quiet "${desc.className}.${desc.name}: ${result.resultType} ${(result.getEndTime() - result.getStartTime())/1000}s"
    }

    // Exclude tests that require the analytics engine plugin stack (run separately via analyticsEngineSecurityIT)
    filter {
        excludeTestsMatching 'org.opensearch.sql.security.AnalyticsEngineSecurityIT'
    }

    systemProperty 'tests.security.manager', 'false'
    systemProperty 'project.root', project.projectDir.absolutePath

    // Set default query size limit
    systemProperty 'defaultQuerySizeLimit', '10000'

    // Tell the test JVM if the cluster JVM is running under a debugger so that tests can use longer timeouts for
    // requests. The 'doFirst' delays reading the debug setting on the cluster till execution time.
    doFirst {
        systemProperty 'cluster.debug', getDebug()
        getClusters().forEach { cluster ->

            String allTransportSocketURI = cluster.nodes.stream().flatMap { node ->
                node.getAllTransportPortURI().stream()
            }.collect(Collectors.joining(","))
            String allHttpSocketURI = cluster.nodes.stream().flatMap { node ->
                node.getAllHttpSocketURI().stream()
            }.collect(Collectors.joining(","))

            systemProperty "tests.rest.${cluster.name}.http_hosts", "${-> allHttpSocketURI}"
            systemProperty "tests.rest.${cluster.name}.transport_hosts", "${-> allTransportSocketURI}"
        }

        systemProperty "https", "false"
        systemProperty "user", "admin"
        systemProperty "password", "admin"
    }

    if (System.getProperty("test.debug") != null) {
        jvmArgs '-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005'
    }

    filter {
        includeTestsMatching 'org.opensearch.sql.security.*'
    }
}

yamlRestTest {
    systemProperty 'tests.security.manager', 'false'
}

// Run PPL ITs and new, legacy and comparison SQL ITs with new SQL engine enabled
integTest {
    useCluster testClusters.remoteCluster

    // Set properties for connection to clusters and between clusters
    doFirst {
        getClusters().forEach { cluster ->
            String allTransportSocketURI = cluster.nodes.stream().flatMap { node ->
                node.getAllTransportPortURI().stream()
            }.collect(Collectors.joining(","))
            String allHttpSocketURI = cluster.nodes.stream().flatMap { node ->
                node.getAllHttpSocketURI().stream()
            }.collect(Collectors.joining(","))

            systemProperty "tests.rest.${cluster.name}.http_hosts", "${-> allHttpSocketURI}"
            systemProperty "tests.rest.${cluster.name}.transport_hosts", "${-> allTransportSocketURI}"
        }
    }

    testLogging {
        events "failed"
    }
    
    dependsOn ':opensearch-sql-plugin:bundlePlugin'
    if(!ignorePrometheus && getOSFamilyType() != "windows") {
        dependsOn startPrometheus
        finalizedBy stopPrometheus
    }

    // enable calcite codegen in IT
    systemProperty 'calcite.debug', 'false'
    systemProperty 'org.codehaus.janino.source_debugging.enable', 'false'
    systemProperty 'org.codehaus.janino.source_debugging.dir', calciteCodegen

    systemProperty 'tests.security.manager', 'false'
    systemProperty('project.root', project.projectDir.absolutePath)

    systemProperty "https", System.getProperty("https")
    systemProperty "user", System.getProperty("user")
    systemProperty "password", System.getProperty("password")

    // Set default query size limit
    systemProperty 'defaultQuerySizeLimit', '10000'

    // Tell the test JVM if the cluster JVM is running under a debugger so that tests can use longer timeouts for
    // requests. The 'doFirst' delays reading the debug setting on the cluster till execution time.
    doFirst {
        if (System.getProperty("debug-jvm") != null) {
            setDebug(true);
        }
        systemProperty 'cluster.debug', getDebug()
    }


    if (System.getProperty("test.debug") != null) {
        jvmArgs '-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5006'
    }

    if (System.getProperty("tests.rest.bwcsuite") == null) {
        filter {
            excludeTestsMatching "org.opensearch.sql.bwc.*IT"
        }
    }

    if(getOSFamilyType() == "windows" || ignorePrometheus) {
        exclude 'org/opensearch/sql/ppl/PrometheusDataSourceCommandsIT.class'
        exclude 'org/opensearch/sql/ppl/ShowDataSourcesCommandIT.class'
        exclude 'org/opensearch/sql/ppl/InformationSchemaCommandIT.class'
    }

    exclude 'org/opensearch/sql/doctest/**/*IT.class'
    exclude 'org/opensearch/sql/correctness/**'

    // Exclude tests that require the analytics engine plugin stack (run separately via dedicated tasks)
    exclude 'org/opensearch/sql/analytics/AnalyticsEngineProfileIT.class'

    // Explain IT is dependent on internal implementation of old engine so it's not necessary
    // to run these with new engine and not necessary to make this consistent with old engine.
    exclude 'org/opensearch/sql/legacy/ExplainIT.class'
    exclude 'org/opensearch/sql/legacy/PrettyFormatterIT.class'
    exclude 'org/opensearch/sql/legacy/TermQueryExplainIT.class'

    // Skip old semantic analyzer IT because analyzer in new engine has different behavior
    exclude 'org/opensearch/sql/legacy/QueryAnalysisIT.class'

    // Skip this IT because all assertions are against explain output
    exclude 'org/opensearch/sql/legacy/OrderIT.class'

    // Exclude JDBC related tests
    exclude 'org/opensearch/sql/jdbc/**'

    // Exclude this IT, because they executed in another task (:integTestWithSecurity)
    exclude 'org/opensearch/sql/security/**'

    // Exclude the analytics-engine smoke test, because it executes in another task
    // (:analyticsEngineCompatIT) against a cluster that bundles the analytics-engine plugin
    // stack. Running it here against the plain integTest/remoteCluster (no analytics-engine)
    // is pointless and leaves it exposed to suite-wide infra flakiness.
    exclude 'org/opensearch/sql/plugin/AnalyticsEngineCompatIT.class'

    // Workaround for Gradle 9.4.1 ClassCastException in TestEventReporterAsListener.started
    // (line 58) — the bridge casts a parent test descriptor's reporter to
    // GroupTestEventReporterInternal but a class-level @Ignore produces a non-composite parent
    // descriptor with a leaf reporter, so the cast fails and aborts the entire integTest task
    // even though the tests would have been skipped anyway. The bridge is registered by Gradle's
    // own AbstractTestTask (we can't bypass it from user code), so the only available remedy is
    // to keep these classes off the test runner's input set. Net behaviour for CI: still
    // skipped, just at the build layer instead of inside JUnit. Remove once Gradle ships a fix
    // (not fixed as of 9.5.0). OrderIT is already excluded above.
    exclude 'org/opensearch/sql/calcite/remote/CalciteInformationSchemaCommandIT.class'
    exclude 'org/opensearch/sql/calcite/remote/CalciteJsonFunctionsIT.class'
    exclude 'org/opensearch/sql/calcite/remote/CalcitePrometheusDataSourceCommandsIT.class'
    exclude 'org/opensearch/sql/calcite/remote/CalciteShowDataSourcesCommandIT.class'
    exclude 'org/opensearch/sql/legacy/AggregationIT.class'
    exclude 'org/opensearch/sql/legacy/DateFormatIT.class'
    exclude 'org/opensearch/sql/legacy/DateFunctionsIT.class'
    exclude 'org/opensearch/sql/legacy/HashJoinIT.class'
    exclude 'org/opensearch/sql/legacy/HavingIT.class'
    exclude 'org/opensearch/sql/legacy/JSONRequestIT.class'
    exclude 'org/opensearch/sql/legacy/JoinIT.class'
    exclude 'org/opensearch/sql/legacy/MathFunctionsIT.class'
    exclude 'org/opensearch/sql/legacy/MetricsIT.class'
    exclude 'org/opensearch/sql/legacy/MultiQueryIT.class'
    exclude 'org/opensearch/sql/legacy/NestedFieldQueryIT.class'
    exclude 'org/opensearch/sql/legacy/PreparedStatementIT.class'
    exclude 'org/opensearch/sql/legacy/QueryFunctionsIT.class'
    exclude 'org/opensearch/sql/legacy/QueryIT.class'
    exclude 'org/opensearch/sql/legacy/SQLFunctionsIT.class'
    exclude 'org/opensearch/sql/legacy/ShowIT.class'
    exclude 'org/opensearch/sql/legacy/SourceFieldIT.class'
    exclude 'org/opensearch/sql/legacy/SubqueryIT.class'
    exclude 'org/opensearch/sql/ppl/JsonFunctionsIT.class'
    exclude 'org/opensearch/sql/sql/ExpressionIT.class'

    finalizedBy 'printIntegTestPaths'
}

