task integTestRemote(type: RestIntegTestTask) {
    testLogging {
        events "passed", "skipped", "failed"
    }
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    systemProperty 'tests.security.manager', 'false'
    systemProperty('project.root', project.projectDir.absolutePath)
    systemProperty 'java.io.tmpdir', opensearch_tmp_dir.absolutePath

    systemProperty "https", System.getProperty("https")
    systemProperty "user", System.getProperty("user")
    systemProperty "password", System.getProperty("password")

    // Forward the analytics-engine parquet-indices toggle when set on the gradle command
    // line. TestUtils.createIndexByRestClient reads this to back every test-created index
    // with composite/parquet so RestUnifiedQueryAction.isAnalyticsIndex (post-#5432) routes
    // to the analytics-engine planner via index settings.
    if (System.getProperty("tests.analytics.parquet_indices") != null) {
        systemProperty 'tests.analytics.parquet_indices', System.getProperty("tests.analytics.parquet_indices")
    }

    // Primary-shard count for analytics-backed test indices (default 1). Set to e.g. 3 to
    // reproduce multi-shard coordination behavior on a single-node cluster.
    if (System.getProperty("tests.analytics.num_shards") != null) {
        systemProperty 'tests.analytics.num_shards', System.getProperty("tests.analytics.num_shards")
    }

    // True only when the analytics-engine route is active (every test index parquet-backed). Matches
    // AnalyticsIndexConfig.isEnabled, which parses the value rather than checking mere presence, so a
    // `-Dtests.analytics.parquet_indices=false` run stays on the v2 path.
    def analyticsEnabled = Boolean.parseBoolean(System.getProperty("tests.analytics.parquet_indices", "false"))

    // Set default query size limit
    systemProperty 'defaultQuerySizeLimit', '10000'

    filter {
        if (System.getProperty("tests.rest.bwcsuite") == null) {
            excludeTestsMatching "org.opensearch.sql.bwc.*IT"
        }

        if (analyticsEnabled) {
            // Full-text search (search-filter syntax -> Lucene query_string) needs an inverted-index
            // reader that parquet-backed analytics indices lack, so it's unsupported on this route.
            excludeTestsMatching '*OperatorIT.testEqualOperator'
            excludeTestsMatching '*OperatorIT.testNotEqualOperator'
            excludeTestsMatching '*OperatorIT.testLessOperator'
            excludeTestsMatching '*OperatorIT.testLteOperator'
            excludeTestsMatching '*OperatorIT.testGreaterOperator'
            excludeTestsMatching '*OperatorIT.testGteOperator'
            excludeTestsMatching '*OperatorIT.testNotOperator'

            // === Excludes: PPL ITs doomed by the unsupported-field strip ===
            // On the AE route TestUtils.AnalyticsIndexConfig strips nested/geo_point/geo_shape/alias
            // fields from every test mapping AND its bulk data (the parquet/composite store can't
            // scan them). A test whose query references such a field can't pass — the data is gone.
            // Verified field-by-field against the index mappings; only doomed work is excluded.
            // Gated on the parsed boolean so `-Dtests.analytics.parquet_indices=false` excludes none.
            //
            // GeoPointFormatsIT: EVERY test reads a geo_point field — whole class doomed.
            excludeTestsMatching 'org.opensearch.sql.ppl.GeoPointFormatsIT'
            // datatypes_index_mapping: nested_value=nested, geo_point_value=geo_point.
            // Glob matches the Calcite subclasses too (CalciteDataTypeIT, CalciteSystemFunctionIT).
            excludeTestsMatching '*DataTypeIT.test_nonnumeric_data_types'
            excludeTestsMatching '*SystemFunctionIT.typeof_opensearch_types'
            // alias_index_mapping: alias_col is type=alias; query is `where alias_col > 1`.
            excludeTestsMatching '*DataTypeIT.test_alias_data_type'
            // CalciteAliasFieldAggregationIT: raw-PUT alias index can't be created on the AE route
            // and every test queries alias fields directly — whole class doomed.
            excludeTestsMatching 'org.opensearch.sql.calcite.remote.CalciteAliasFieldAggregationIT'

            // === Excludes: WhereCommandIT / CalciteWhereCommandIT route divergences (#5546) ===
            // Each test also carries an in-test requireCapability(...) recording the reason (see
            // Capability); listed here so the AE-route skip set stays countable in one
            // place. Reasons:
            //  - Nested-field queries: the parquet/composite store has no nested-document support, so
            //    nested fields are stripped at load (#5541). Defined only in CalciteWhereCommandIT.
            excludeTestsMatching '*CalciteWhereCommandIT.testFilterOnComputedNestedFields'
            excludeTestsMatching '*CalciteWhereCommandIT.testFilterOnNestedAndRootFields'
            excludeTestsMatching '*CalciteWhereCommandIT.testFilterOnNestedFields'
            excludeTestsMatching '*CalciteWhereCommandIT.testFilterOnMultipleCascadedNestedFields'
            excludeTestsMatching '*CalciteWhereCommandIT.testScriptFilterOnDifferentNestedHierarchyShouldThrow'
            excludeTestsMatching '*CalciteWhereCommandIT.testAggFilterOnNestedFields'
            //  - _id metadata field not exposed on parquet-backed scans. Defined in the base
            //    WhereCommandIT and inherited by CalciteWhereCommandIT; the glob matches both runs.
            excludeTestsMatching '*WhereCommandIT.testWhereWithMetadataFields'
            excludeTestsMatching '*WhereCommandIT.testWhereWithMetadataFields2'
            //  - Exact == on a dynamically-mapped string (email) returns no rows: dynamic mapping
            //    omits the .keyword sub-field on the AE route.
            excludeTestsMatching '*WhereCommandIT.testDoubleEqualWithSpecialCharacters'

            // === Excludes: CalciteMultisearchCommandIT route divergences ===
            // Each test also carries an in-test requireCapability(...) recording the reason (see
            // Capability); listed here so the AE-route skip set stays countable.
            //  - Same-index subsearch conflation: when every subsearch reads the same index, the AE
            //    route applies the first subsearch's filter to all of them, so counts are wrong.
            excludeTestsMatching '*CalciteMultisearchCommandIT.testMultisearchWithThreeSubsearches'
            excludeTestsMatching '*CalciteMultisearchCommandIT.testMultisearchWithComplexAggregation'
            excludeTestsMatching '*CalciteMultisearchCommandIT.testMultisearchWithoutFurtherProcessing'
            //  - Column-order divergence: multisearch over different indices returns merged columns
            //    in a different order than the v2/Calcite path.
            excludeTestsMatching '*CalciteMultisearchCommandIT.testMultisearchWithTimestampInterleaving'

            // === Excludes: CalciteBinCommandIT route divergences ===
            // bin on a time field then grouping by it: the AE route types the date-histogram bucket
            // column as string (not timestamp) AND produces a different bucket set (auto-histogram
            // span / empty-bucket filtering differ), so both schema and row counts diverge. Each
            // test also carries an in-test requireCapability(...) (see Capability).
            excludeTestsMatching '*CalciteBinCommandIT.testStatsWithBinsOnTimeField_Count'
            excludeTestsMatching '*CalciteBinCommandIT.testStatsWithBinsOnTimeField_Avg'
            excludeTestsMatching '*CalciteBinCommandIT.testStatsWithBinsOnTimeAndTermField_Count'
            excludeTestsMatching '*CalciteBinCommandIT.testStatsWithBinsOnTimeAndTermField_Avg'

            // === Excludes: CalcitePPLEnhancedCoalesceIT route divergences ===
            // Each test also carries an in-test requireCapability(...) recording the reason (see
            // Capability). The other ordering-sensitive coalesce tests were fixed in
            // place with an explicit `sort` instead of being skipped.
            //  - COALESCE over all-untyped-null operands is rejected by the capability registry.
            excludeTestsMatching '*CalcitePPLEnhancedCoalesceIT.testCoalesceWithAllNonExistentFields'
            //  - head N without a sort unique over the head window is non-deterministic, and the
            //    nullable tiebreak these would need orders nulls differently than v2/Calcite.
            excludeTestsMatching '*CalcitePPLEnhancedCoalesceIT.testCoalesceWithMixedTypes'
            excludeTestsMatching '*CalcitePPLEnhancedCoalesceIT.testCoalesceBasic'

            // === Excludes: CalcitePPLScalarSubqueryIT / CalcitePPLInSubqueryIT route divergences ===
            // Each test also carries an in-test requireCapability(...) recording the reason (see
            // Capability); listed here so the AE-route skip set stays countable.
            //  - Exact equality on an explicitly text-mapped field (department/occupation = '...')
            //    in the subsearch returns no rows on the AE route (analyzed text, no .keyword).
            excludeTestsMatching '*CalcitePPLScalarSubqueryIT.testTwoUncorrelatedScalarSubqueriesInOr'
            excludeTestsMatching '*CalcitePPLInSubqueryIT.testInSubqueryWithTableAlias'
            excludeTestsMatching '*CalcitePPLInSubqueryIT.testInCorrelatedSubquery'
            //  - subsearch.maxout is lowered as a LIMIT on the in-subquery semi-join's right side,
            //    which the AE route does not honor, so the subsearch returns all rows.
            excludeTestsMatching '*CalcitePPLInSubqueryIT.testSubsearchMaxOut'

            // === Excludes: CalcitePPLConditionBuiltinFunctionIT route divergences ===
            // Each test also carries an in-test requireCapability(...) recording the reason (see
            // Capability); listed here so the AE-route skip set stays countable.
            //  - isnull/isnotnull on the object/struct parent field big5.aws: objects are flattened
            //    to dotted leaf columns and the struct parent is not a queryable column.
            excludeTestsMatching '*CalcitePPLConditionBuiltinFunctionIT.testIsNullWithStruct'
            excludeTestsMatching '*CalcitePPLConditionBuiltinFunctionIT.testIsNotNullWithStruct'
            //  - isnull/isnotnull on the nested field nested_simple.address: nested fields are
            //    stripped at index creation (the route can't store them).
            excludeTestsMatching '*CalcitePPLConditionBuiltinFunctionIT.testIsNullWithNested'
            excludeTestsMatching '*CalcitePPLConditionBuiltinFunctionIT.testIsNotNullWithNested'
            //  - concat('H', null): DataFusion treats NULL as empty string; v2/Calcite propagates NULL.
            excludeTestsMatching '*CalcitePPLConditionBuiltinFunctionIT.testNullIfWithExpression'
            //  - earliest('now', utc_timestamp()): 'now' and utc_timestamp() resolve to the same
            //    instant on the route (true) but differ on v2 (false).
            excludeTestsMatching '*CalcitePPLConditionBuiltinFunctionIT.testEarliestWithEval'

            // === Excludes: CalcitePPLEvalMaxMinFunctionIT route divergences ===
            // The AnalyticsExecutionEngine ANY-rescue (this PR) fixes the homogeneous max()/min()
            // schema types, so most of the class now passes on the AE route. Three tests still
            // diverge; each carries an in-test requireCapability(...) (see Capability).
            //  - Mixed numeric+string operands throw 'Cannot infer return type for GREATEST' (the
            //    DataFusion GREATEST/LEAST can't unify heterogeneous operand types).
            excludeTestsMatching '*CalcitePPLEvalMaxMinFunctionIT.testEvalMaxNumericAndString'
            excludeTestsMatching '*CalcitePPLEvalMaxMinFunctionIT.testEvalMinNumericAndString'
            //  - max() over int operands reports bigint on the AE route (DataFusion widens integers
            //    to Int64) where the v2/Calcite path reports int.
            excludeTestsMatching '*CalcitePPLEvalMaxMinFunctionIT.testEvalMaxNumeric'

            // === Excludes: CalcitePPLCaseFunctionIT route divergences ===
            // bin @timestamp then group by it: bucket column typed string (not timestamp) on AE.
            excludeTestsMatching '*CalcitePPLCaseFunctionIT.testNestedCaseAggWithAutoDateHistogram'

            // === Excludes: CalcitePPLStringBuiltinFunctionIT route divergences ===
            // Re-PUT a shared _id with different data; the append-only AE store can't replace docs.
            excludeTestsMatching '*CalcitePPLStringBuiltinFunctionIT.testConcatWithField'
            excludeTestsMatching '*CalcitePPLStringBuiltinFunctionIT.testConcatWs'
            excludeTestsMatching '*CalcitePPLStringBuiltinFunctionIT.testReverse'
            excludeTestsMatching '*CalcitePPLStringBuiltinFunctionIT.testRight'
            excludeTestsMatching '*CalcitePPLStringBuiltinFunctionIT.testTrim'
            excludeTestsMatching '*CalcitePPLStringBuiltinFunctionIT.testRTrim'
            excludeTestsMatching '*CalcitePPLStringBuiltinFunctionIT.testLTrim'

            // === Excludes: full-text relevance functions (unsupported on DataFusion) ===
            excludeTestsMatching '*MultiMatchIT.test_wildcard_multi_match'
            excludeTestsMatching '*QueryStringIT.wildcard_test'
            excludeTestsMatching '*SimpleQueryStringIT.test_wildcard_simple_query_string'

            // === Excludes: CalciteLikeQueryIT route divergence ===
            // LIKE is case-insensitive on AE (DataFusion); v2/Calcite treats LIKE as case-sensitive.
            excludeTestsMatching '*CalciteLikeQueryIT.test_the_default_3rd_option'

            // === Excludes: CalcitePPLAppendPipeCommandIT route divergence ===
            // appendpipe drops the main pipeline's rows on AE (subpipe filter applied in place).
            excludeTestsMatching '*CalcitePPLAppendPipeCommandIT.testDoubleAppendPipeWithFilter'
        }
    }

    // Exclude the same tests that are excluded for integTest
    exclude 'org/opensearch/sql/doctest/**/*IT.class'
    exclude 'org/opensearch/sql/correctness/**'
    exclude 'org/opensearch/sql/legacy/ExplainIT.class'
    exclude 'org/opensearch/sql/legacy/PrettyFormatterIT.class'
    exclude 'org/opensearch/sql/legacy/TermQueryExplainIT.class'
    exclude 'org/opensearch/sql/legacy/QueryAnalysisIT.class'
    exclude 'org/opensearch/sql/legacy/OrderIT.class'
    exclude 'org/opensearch/sql/jdbc/**'
}
