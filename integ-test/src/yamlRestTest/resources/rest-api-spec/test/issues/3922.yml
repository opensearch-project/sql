setup:
  - do:
      indices.create:
        index: test_issue_3922
        body:
          settings:
            number_of_shards: 1
            number_of_replicas: 0
          mappings:
            properties:
              name:
                type: keyword
              category:
                type: keyword
              value:
                type: integer
  - do:
      query.settings:
        body:
          transient:
            plugins.calcite.enabled: true

---
teardown:
  - do:
      query.settings:
        body:
          transient:
            plugins.calcite.enabled: false

---
"Sort order preserved through dedup (#3922)":
  - skip:
      features:
        - headers
        - allowed_warnings
  - do:
      bulk:
        index: test_issue_3922
        refresh: true
        body:
          - '{"index": {}}'
          - '{"name": "A", "category": "X", "value": 1}'
          - '{"index": {}}'
          - '{"name": "B", "category": "X", "value": 2}'
          - '{"index": {}}'
          - '{"name": "A", "category": "Y", "value": 3}'
          - '{"index": {}}'
          - '{"name": "C", "category": "Z", "value": 4}'
          - '{"index": {}}'
          - '{"name": "B", "category": "Z", "value": 5}'
  - do:
      allowed_warnings:
        - 'Loading the fielddata on the _id field is deprecated and will be removed in future versions. If you require sorting or aggregating on this field you should also include the id in the body of your documents, and map this field as a keyword field that has [doc_values] enabled'
      headers:
        Content-Type: 'application/json'
      ppl:
        body:
          query: 'source=test_issue_3922 | sort category | dedup 1 name | fields category, name'
  - match: {"total": 3}
  - match: {"datarows": [["X", "A"], ["X", "B"], ["Z", "C"]]}
