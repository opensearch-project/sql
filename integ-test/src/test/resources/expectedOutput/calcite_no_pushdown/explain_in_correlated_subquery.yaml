calcite:
  logical: |
    LogicalSystemLimit(sort0=[$2], dir0=[DESC-nulls-last], fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(id=[$2], name=[$0], salary=[$4])
        LogicalSort(sort0=[$4], dir0=[DESC-nulls-last])
          LogicalFilter(condition=[IN($0, {
    LogicalProject(name=[$0])
      LogicalFilter(condition=[=($cor0.id, $1)])
        LogicalSystemLimit(fetch=[10000], type=[SUBSEARCH_MAXOUT])
          LogicalFilter(condition=[=($0, 'Tom')])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_work_information]])
    })], variablesSet=[[$cor0]])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_worker]])
  physical: |
    EnumerableCalc(expr#0..2=[{inputs}], id=[$t1], name=[$t0], salary=[$t2])
      EnumerableLimit(fetch=[10000])
        EnumerableSort(sort0=[$2], dir0=[DESC-nulls-last])
          EnumerableHashJoin(condition=[AND(=($1, $4), =($0, $3))], joinType=[semi])
            EnumerableCalc(expr#0..10=[{inputs}], name=[$t0], id=[$t2], salary=[$t4])
              CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_worker]])
            EnumerableCalc(expr#0=[{inputs}], expr#1=['Tom':VARCHAR], expr#2=[CAST($t1):VARCHAR], name=[$t2], uid=[$t0])
              EnumerableAggregate(group=[{1}])
                EnumerableCalc(expr#0..10=[{inputs}], expr#11=[10000], expr#12=[<=($t10, $t11)], expr#13=[IS NOT NULL($t1)], expr#14=[AND($t12, $t13)], proj#0..10=[{exprs}], $condition=[$t14])
                  EnumerableWindow(window#0=[window(rows between UNBOUNDED PRECEDING and CURRENT ROW aggs [ROW_NUMBER()])])
                    EnumerableCalc(expr#0..9=[{inputs}], expr#10=['Tom':VARCHAR], expr#11=[=($t0, $t10)], proj#0..9=[{exprs}], $condition=[$t11])
                      CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_work_information]])
