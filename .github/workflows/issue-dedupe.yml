---
name: Issue Dedupe
on:
  issues:
    types: [opened]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        type: choice
        options:
          - detect
          - auto-close
        default: detect
      issue_number:
        description: 'Issue number to check for duplicates (detect only)'
        required: false
        type: string

jobs:
  detect:
    if: github.event_name == 'issues' || (github.event_name == 'workflow_dispatch' && inputs.job == 'detect')
    uses: qianheng-aws/opensearch-build/.github/workflows/issue-dedupe-detect.yml@add-issue-dedupe-workflow
    permissions:
      contents: read
      issues: write
      id-token: write
    secrets:
      BEDROCK_ACCESS_ROLE_ISSUE: ${{ secrets.BEDROCK_ACCESS_ROLE_ISSUE }}
    with:
      issue_number: ${{ inputs.issue_number || '' }}
      grace_days: ${{ vars.DUPLICATE_GRACE_DAYS || '7' }}

  auto-close:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.job == 'auto-close')
    uses: qianheng-aws/opensearch-build/.github/workflows/issue-dedupe-autoclose.yml@add-issue-dedupe-workflow
    permissions:
      issues: write
    with:
      grace_days: ${{ vars.DUPLICATE_GRACE_DAYS || '7' }}
