name: SQL Java CI

on:
  pull_request:
  push:
    branches-ignore:
      - 'backport/**'
      - 'dependabot/**'
    paths:
      - '**/*.java'
      - '**/*.g4'
      - '!sql-jdbc/**'
      - '**gradle*'
      - '**lombok*'
      - 'integ-test/**'
      - '**/*.jar'
      - '**/*.pom'
      - '.github/workflows/sql-test-and-build-workflow.yml'
  merge_group:

jobs:
  assemble-linux:
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Assemble
        run: |
          ./gradlew assemble compileTestJava --no-daemon

  assemble-windows-macos:
    strategy:
      fail-fast: false
      matrix:
        entry:
          - { os: windows-latest, java: 21, os_build_args: -PbuildPlatform=windows }
          - { os: windows-latest, java: 24, os_build_args: -PbuildPlatform=windows }
          - { os: macos-latest, java: 21, os_build_args: '' }
          - { os: macos-latest, java: 24, os_build_args: '' }
    runs-on: ${{ matrix.entry.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.entry.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.entry.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Assemble
        run: ./gradlew assemble compileTestJava --no-daemon ${{ matrix.entry.os_build_args }}
        shell: bash

  spotless:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 21

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-provider: basic

    - name: Spotless Check
      run: |
        ./gradlew spotlessCheck --no-daemon

  build-linux:
    needs: [assemble-linux]
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]
        test-type: ['unit', 'integration', 'doc']
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build and Test
        run: |
          if [ "${{ matrix.test-type }}" = "unit" ]; then
            ./gradlew --continue build -x spotlessCheck -x integTest -x yamlRestTest -x doctest
          elif [ "${{ matrix.test-type }}" = "integration" ]; then
            ./gradlew --continue integTest yamlRestTest
          else
            ./gradlew --continue doctest
          fi

      - name: Create Artifact Path
        if: ${{ matrix.test-type == 'unit' }}
        run: |
          mkdir -p opensearch-sql-builds
          cp -r ./plugin/build/distributions/*.zip opensearch-sql-builds/

      # Codecov disabled as it's been broken for a while and nontrivial to reactivate.
      # Re-enable if you dare.
      #
      # - name: Upload SQL Coverage Report
      #   if: ${{ always() }}
      #   uses: codecov/codecov-action@v4
      #   continue-on-error: true
      #   with:
      #     flags: sql-engine
      #     token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Artifacts
        if: ${{ matrix.test-type == 'unit' }}
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: opensearch-sql-ubuntu-latest-${{ matrix.java }}
          path: opensearch-sql-builds

      - name: Upload test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: test-reports-ubuntu-latest-${{ matrix.java }}-${{ matrix.test-type }}
          path: |
            sql/build/reports/**
            ppl/build/reports/**
            core/build/reports/**
            common/build/reports/**
            opensearch/build/reports/**
            integ-test/build/reports/**
            protocol/build/reports/**
            legacy/build/reports/**
            plugin/build/reports/**
            doctest/build/testclusters/docTestCluster-0/logs/*
            integ-test/build/testclusters/*/logs/*

  build-windows-macos:
    needs: assemble-windows-macos
    strategy:
      fail-fast: false
      matrix:
        entry:
          - { os: windows-latest, java: 21, os_build_args: -PbuildPlatform=windows }
          - { os: windows-latest, java: 25, os_build_args: -PbuildPlatform=windows }
          - { os: macos-latest, java: 21, os_build_args: '' }
          - { os: macos-latest, java: 25, os_build_args: '' }
        test-type: ['unit', 'integration', 'doc']
        exclude:
          # Exclude doctest for Windows
          - test-type: doc
            entry: { os: windows-latest, java: 21, os_build_args: -PbuildPlatform=windows }
          - test-type: doc
            entry: { os: windows-latest, java: 25, os_build_args: -PbuildPlatform=windows }
    runs-on: ${{ matrix.entry.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.entry.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.entry.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build and Test
        run: |
          if [ "${{ matrix.test-type }}" = "unit" ]; then
            ./gradlew --continue build -x spotlessCheck -x integTest -x yamlRestTest -x doctest ${{ matrix.entry.os_build_args }}
          elif [ "${{ matrix.test-type }}" = "integration" ]; then
            ./gradlew --continue integTest yamlRestTest ${{ matrix.entry.os_build_args }}
          else
            ./gradlew --continue doctest ${{ matrix.entry.os_build_args }}
          fi
        shell: bash

      - name: Create Artifact Path
        if: ${{ matrix.test-type == 'unit' }}
        run: |
          mkdir -p opensearch-sql-builds
          cp -r ./plugin/build/distributions/*.zip opensearch-sql-builds/

      # Codecov disabled as it's been broken for a while and nontrivial to reactivate.
      # Re-enable if you dare.
      #
      # - name: Upload SQL Coverage Report
      #   if: ${{ always() && matrix.entry.os == 'ubuntu-latest' }}
      #   uses: codecov/codecov-action@v4
      #   continue-on-error: true
      #   with:
      #     flags: sql-engine
      #     token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Artifacts
        if: ${{ matrix.test-type == 'unit' }}
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: opensearch-sql-${{ matrix.entry.os }}-${{ matrix.entry.java }}
          path: opensearch-sql-builds

      - name: Upload test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: test-reports-${{ matrix.entry.os }}-${{ matrix.entry.java }}-${{ matrix.test-type }}
          path: |
            sql/build/reports/**
            ppl/build/reports/**
            core/build/reports/**
            common/build/reports/**
            opensearch/build/reports/**
            integ-test/build/reports/**
            protocol/build/reports/**
            legacy/build/reports/**
            plugin/build/reports/**
            doctest/build/testclusters/docTestCluster-0/logs/*
            integ-test/build/testclusters/*/logs/*

  bwc-tests-rolling-upgrade:
    needs: [assemble-linux]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [21, 25]

    steps:

      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run backward compatibility tests in rolling upgrade
        run: |
          ./scripts/bwctest-rolling-upgrade.sh

      - name: Upload test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: test-reports-ubuntu-latest-${{ matrix.java }}-bwc
          path: |
            sql/build/reports/**
            ppl/build/reports/**
            core/build/reports/**
            common/build/reports/**
            opensearch/build/reports/**
            integ-test/build/reports/**
            protocol/build/reports/**
            legacy/build/reports/**
            plugin/build/reports/**
            doctest/build/testclusters/docTestCluster-0/logs/*
            integ-test/build/testclusters/*/logs/*

  bwc-tests-full-restart:
    needs: [assemble-linux]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [21, 25]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run backward compatibility tests in full restart
        run: |
          ./scripts/bwctest-full-restart.sh

      - name: Upload test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: test-reports-ubuntu-latest-${{ matrix.java }}-bwc-full-restart
          path: |
            sql/build/reports/**
            ppl/build/reports/**
            core/build/reports/**
            common/build/reports/**
            opensearch/build/reports/**
            integ-test/build/reports/**
            protocol/build/reports/**
            legacy/build/reports/**
            plugin/build/reports/**
            doctest/build/testclusters/docTestCluster-0/logs/*
            integ-test/build/testclusters/*/logs/*

  security-it-linux:
    needs: [assemble-linux]
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-provider: basic

    - name: Run security integration tests
      run: |
        ./gradlew integTestWithSecurity

    - name: Upload test reports
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      continue-on-error: true
      with:
        name: test-reports-ubuntu-latest-${{ matrix.java }}-security-it
        path: |
          integ-test/build/reports/**
          integ-test/build/testclusters/*/logs/*
          integ-test/build/testclusters/*/config/*

  security-it-windows-macos:
    needs: assemble-windows-macos
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-latest ]
        java: [21, 25]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-provider: basic

    - name: Run security integration tests
      run: ./gradlew integTestWithSecurity

    - name: Upload test reports
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      continue-on-error: true
      with:
        name: test-reports-${{ matrix.os }}-${{ matrix.java }}-security-it
        path: |
          integ-test/build/reports/**
          integ-test/build/testclusters/*/logs/*
          integ-test/build/testclusters/*/config/*
