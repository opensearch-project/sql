buildscript {
    ext {
        opensearch_version = System.getProperty("opensearch.version", "3.7.0-SNAPSHOT")
        isSnapshot = "true" == System.getProperty("build.snapshot", "true")
        buildVersionQualifier = System.getProperty("build.version_qualifier", "")
        version_tokens = opensearch_version.tokenize('-')
        opensearch_build = version_tokens[0] + '.0'
        prometheus_binary_version = "2.37.2"
        common_utils_version = System.getProperty("common_utils.version", opensearch_build)
        if (buildVersionQualifier) {
            opensearch_build += "-${buildVersionQualifier}"
        }
        //this variable for always downloading snapshot version of security plugin.
        //need to figure out more elegant solution for integ tests with security.
        opensearch_build_snapshot = opensearch_build + '-SNAPSHOT'
        if (isSnapshot) {
            // 2.0.0-rc1-SNAPSHOT -> 2.0.0.0-rc1-SNAPSHOT (opensearch_build)
            opensearch_build += "-SNAPSHOT"
        }
        getArchType = {
            if (System.getProperty("os.arch").startsWith("x") || System.getProperty("os.arch").startsWith("amd")) {
                return "amd64"
            }
            else {
                return "arm64"
            }
        }
        getOSFamilyType = {
            def os = org.gradle.internal.os.OperatingSystem.current();
            if (os.isMacOsX()) {
                return "darwin"
            }
            else if(os.isLinux()){
                return "linux"
            }
            else if(os.isWindows()) {
                return "windows"
            }
            else {
                return os.getFamilyName().toString()
            }
        }
        getPrometheusBinaryLocation = { ->
            return "https://github.com/prometheus/prometheus/releases/download/v${prometheus_binary_version}/prometheus-${prometheus_binary_version}."+ getOSFamilyType() + "-" + getArchType() + ".tar.gz"
        }
        // TODO: Migrate following to Gradle version catalog || Read from OpenSearch BOM in the future.
        // See: https://github.com/opensearch-project/sql/issues/3257
        aws_java_sdk_version = "1.12.651"
        guava_version = "33.3.0-jre"
        resilience4j_version = "1.5.0"
        hamcrest_version = "2.1"
        mockito_version = "5.7.0"
        commons_io_version = "2.14.0"
        commons_text_version = "1.10.0"
        commons_lang3_version = "3.18.0"
        // enforce 1.13, https://www.whitesourcesoftware.com/vulnerability-database/WS-2019-0379
        commons_codec_version = "1.13"
        commons_logging_version = "1.2"
    }

    repositories {
        mavenLocal()
        mavenCentral()
        maven { url "https://ci.opensearch.org/ci/dbc/snapshots/maven/" }
    }

    dependencies {
        classpath "org.opensearch.gradle:build-tools:${opensearch_version}"
    }
}

plugins {
    id "com.netflix.nebula.ospackage-base" version "12.0.0"
    id 'java-library'
    id "io.freefair.lombok" version "8.14"
    id 'jacoco'
    id 'com.diffplug.spotless' version '8.1.0'
    id 'de.undercouch.download' version '5.3.0'
}

// import versions defined in https://github.com/opensearch-project/OpenSearch/blob/main/buildSrc/src/main/java/org/opensearch/gradle/OpenSearchJavaPlugin.java#L94
// versions https://github.com/opensearch-project/OpenSearch/blob/main/buildSrc/version.properties
apply plugin: 'opensearch.java'
apply plugin: 'opensearch.java-agent'

// Repository on root level is for dependencies that project code depends on. And this block must be placed after plugins{}
repositories {
    mavenLocal()
    mavenCentral() // For Elastic Libs that you can use to get started coding until open OpenSearch libs are available
    maven {
        url 'https://jitpack.io'
        content { includeGroup "com.github.babbel" }
    }
    maven { url "https://ci.opensearch.org/ci/dbc/snapshots/maven/" }
}

spotless {
    java {
        target fileTree('.') {
            include '**/*.java'
            exclude '**/build/**', '**/build-*/**', '**/gen/**'
        }
        importOrder()
        licenseHeader("/*\n" +
                " * Copyright OpenSearch Contributors\n" +
                " * SPDX-License-Identifier: Apache-2.0\n" +
                " */\n\n")
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
        googleJavaFormat('1.32.0').reflowLongStrings().groupArtifact('com.google.googlejavaformat:google-java-format')
    }
}

// Remote URLs for the analytics-engine + arrow-flight-rpc plugin ZIPs. The OpenSearch CI maven
// snapshot repo only publishes jar/pom/sources/javadoc, not the plugin distribution zips — so we
// fetch them from the feature-build artifact URLs directly. Versioned by the OpenSearch core
// feature build, not by the maven snapshot timestamp.
ext.analyticsEngineZipUrl = 'https://ci.opensearch.org/ci/dbc/feature-build-opensearch/feature-datafusion/latest/linux/x64/tar/builds/opensearch/plugins/1-analytics-engine-3.7.0.zip'
ext.analyticsEngineZipFile = "${rootProject.layout.buildDirectory.get().asFile}/distributions/analytics-engine-3.7.0-SNAPSHOT.zip"
ext.arrowFlightRpcZipUrl = 'https://ci.opensearch.org/ci/dbc/feature-build-opensearch/feature-datafusion/latest/linux/x64/tar/builds/opensearch/plugins/0-arrow-flight-rpc-3.7.0.zip'
ext.arrowFlightRpcZipFile = "${rootProject.layout.buildDirectory.get().asFile}/distributions/arrow-flight-rpc-3.7.0-SNAPSHOT.zip"

tasks.register('downloadAnalyticsEngineZip', de.undercouch.gradle.tasks.download.Download) {
    src analyticsEngineZipUrl
    dest analyticsEngineZipFile
    overwrite false
    onlyIfModified true
    // Skip the network call when the user supplies a local zip via -PanalyticsEngineZip=/path.
    // (We can't use `project.hasProperty` here because the ext property is always set in the
    // allprojects block below.)
    onlyIf {
        !project.gradle.startParameter.projectProperties.containsKey('analyticsEngineZip')
    }
}

tasks.register('downloadArrowFlightRpcZip', de.undercouch.gradle.tasks.download.Download) {
    src arrowFlightRpcZipUrl
    dest arrowFlightRpcZipFile
    overwrite false
    onlyIfModified true
    onlyIf {
        !project.gradle.startParameter.projectProperties.containsKey('arrowFlightRpcZip')
    }
}

allprojects {
    version = opensearch_version.tokenize('-')[0] + '.0'
    if (buildVersionQualifier) {
        version += "-${buildVersionQualifier}"
    }

    if (isSnapshot) {
        version += "-SNAPSHOT"
    }

    // Plugin ZIPs needed by integration test clusters. analytics-engine declares arrow-flight-rpc
    // as an extendedPlugins parent, so both must be installed (arrow-flight-rpc first). Both
    // default to files produced by the root :download* tasks; either can be overridden via
    // `-PanalyticsEngineZip=/path` / `-ParrowFlightRpcZip=/path` for local development against an
    // unpublished build.
    ext.analyticsEngineZip = project.findProperty('analyticsEngineZip') ?: rootProject.analyticsEngineZipFile
    ext.arrowFlightRpcZip = project.findProperty('arrowFlightRpcZip') ?: rootProject.arrowFlightRpcZipFile

    plugins.withId('java') {
        java {
            sourceCompatibility = JavaVersion.VERSION_21
            targetCompatibility = JavaVersion.VERSION_21
        }
    }

    tasks.withType(Test) {
        jvmArgs '-Dnet.bytebuddy.experimental=true'
    }

    configurations.all {
        resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib:1.9.10"
        resolutionStrategy.force "net.minidev:json-smart:${versions.json_smart}"
        resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib-common:1.9.10"
        resolutionStrategy.force "net.bytebuddy:byte-buddy:1.15.11"
        resolutionStrategy.force "org.apache.httpcomponents.client5:httpclient5:${versions.httpclient5}"
        resolutionStrategy.force "org.apache.httpcomponents.core5:httpcore5:${versions.httpcore5}"
        resolutionStrategy.force "org.apache.httpcomponents.core5:httpcore5-h2:${versions.httpcore5}"
        resolutionStrategy.force "com.fasterxml.jackson.core:jackson-annotations:${versions.jackson_annotations}"
        resolutionStrategy.force "com.fasterxml.jackson.core:jackson-core:${versions.jackson}"
        resolutionStrategy.force "com.fasterxml.jackson.core:jackson-databind:${versions.jackson_databind}"
        resolutionStrategy.force "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:${versions.jackson}"
        resolutionStrategy.force "com.fasterxml.jackson.dataformat:jackson-dataformat-smile:${versions.jackson}"
        resolutionStrategy.force "com.fasterxml.jackson.dataformat:jackson-dataformat-cbor:${versions.jackson}"
        resolutionStrategy.force 'com.google.protobuf:protobuf-java:3.25.5'
        resolutionStrategy.force 'org.locationtech.jts:jts-core:1.19.0'
        resolutionStrategy.force 'com.google.errorprone:error_prone_annotations:2.28.0'
        resolutionStrategy.force 'org.checkerframework:checker-qual:3.43.0'
        resolutionStrategy.force 'org.apache.commons:commons-lang3:3.18.0'
        resolutionStrategy.force 'org.apache.commons:commons-text:1.11.0'
        resolutionStrategy.force 'commons-io:commons-io:2.15.0'
        resolutionStrategy.force 'org.yaml:snakeyaml:2.2'
        resolutionStrategy.dependencySubstitution {
            substitute module('commons-lang:commons-lang') using module('org.apache.commons:commons-lang3:3.18.0') because 'CVE-2025-48924: commons-lang 2.x vulnerable to StackOverflowError'
        }
    }
}

subprojects {
    repositories {
        // Skip mavenLocal for org.opensearch.sandbox.* (analytics-framework, analytics-engine):
        // a locally-published OpenSearch core build can install these with Gradle Module Metadata
        // declaring different attributes than the published snapshot, which can shadow the remote
        // and break resolution. Always pull these from the CI snapshot repo.
        mavenLocal {
            content { excludeGroup 'org.opensearch.sandbox' }
        }
        mavenCentral()
        maven {
            url 'https://jitpack.io'
            content { includeGroup "com.github.babbel" }
        }
        maven { url "https://ci.opensearch.org/ci/dbc/snapshots/maven/" }
        maven { url "https://ci.opensearch.org/ci/dbc/snapshots/lucene/" }
    }

    // Sandbox artifacts (analytics-framework, analytics-engine) publish Gradle Module Metadata
    // declaring `org.gradle.jvm.version=25` because the sandbox uses the FFM API (finalized in
    // JDK 22). sql targets JVM 21, which would make Gradle's variant matcher refuse them.
    // Override the published attribute to 21 for these two modules only — safe because:
    //   - sql code references only non-FFM interfaces of these jars (compile-time API surface).
    //   - Production runtime targets JVM 25 nodes, where the actual JDK 25 bytecode runs fine.
    //   - Rule is scoped to `org.opensearch.sandbox:{analytics-framework,analytics-engine}` —
    //     no effect on any other dependency.
    dependencies {
        components {
            withModule('org.opensearch.sandbox:analytics-framework') { details ->
                details.allVariants {
                    attributes {
                        attribute(org.gradle.api.attributes.java.TargetJvmVersion.TARGET_JVM_VERSION_ATTRIBUTE, 21)
                    }
                }
            }
            withModule('org.opensearch.sandbox:analytics-engine') { details ->
                details.allVariants {
                    attributes {
                        attribute(org.gradle.api.attributes.java.TargetJvmVersion.TARGET_JVM_VERSION_ATTRIBUTE, 21)
                    }
                }
            }
        }
    }

    // Publish internal modules as Maven artifacts for external use, such as by opensearch-spark and opensearch-cli.
    def publishedModules = ['api', 'sql', 'ppl', 'core', 'opensearch', 'common', 'protocol', 'datasources', 'legacy']
    if (publishedModules.contains(name)) {
        apply plugin: 'java-library'
        apply plugin: 'maven-publish'

        def fullArtifactId = "unified-query-${project.name}"
        publishing {
            publications {
                unifiedQuery(MavenPublication) {
                    from components.java
                    groupId = "org.opensearch.query"
                    artifactId = fullArtifactId

                    pom {
                        name = fullArtifactId
                        description = "OpenSearch unified query ${project.name} module"
                        licenses {
                            license {
                                name = 'The Apache License, Version 2.0'
                                url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                            }
                        }
                        developers {
                            developer {
                                name = 'OpenSearch'
                                url = 'https://github.com/opensearch-project/sql'
                            }
                        }
                    }
                }
            }

            repositories {
                maven {
                    name = "Snapshots"
                    url = "https://ci.opensearch.org/ci/dbc/snapshots/maven/"
                    url = System.getenv("MAVEN_SNAPSHOTS_S3_REPO")
                    credentials(AwsCredentials) {
                        accessKey = System.getenv("AWS_ACCESS_KEY_ID")
                        secretKey = System.getenv("AWS_SECRET_ACCESS_KEY")
                        sessionToken = System.getenv("AWS_SESSION_TOKEN")
                    }
                }
            }
        }
    }
}

// TODO: fix compiler warnings
compileJava.options.warnings = false
compileJava {
    options.compilerArgs.addAll(["-processor", 'lombok.launch.AnnotationProcessorHider$AnnotationProcessor'])
    doFirst {
        // TODO: do not fail build on warnings, need to fix all compiler warnings
        options.compilerArgs.remove('-Werror')
        // TODO: need to fix all java doc format
        options.compilerArgs.remove('-Xdoclint:all')
    }
}
// TODO: Similarly, need to fix compiling errors in test source code
compileTestJava.options.warnings = false
compileTestJava {
    options.compilerArgs.addAll(["-processor", 'lombok.launch.AnnotationProcessorHider$AnnotationProcessor'])
    doFirst {
        options.compilerArgs.remove('-Werror')
        options.compilerArgs.remove('-Xdoclint:all')
    }
}

jacoco {
    toolVersion = "0.8.12"
}
jacocoTestReport {
    reports {
        xml.required = false
        csv.required = false
    }
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it,
                    exclude: ['**/antlr/parser/**'])
        }))
    }
}
test.finalizedBy(project.tasks.jacocoTestReport)
jacocoTestCoverageVerification {
    violationRules {
        rule {
            limit {
                minimum = 0.5
            }

        }
    }
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it,
                    exclude: ['**/antlr/parser/**'])
        }))
    }
}
check.dependsOn jacocoTestCoverageVerification


configurations.all {
    resolutionStrategy.force 'junit:junit:4.13.2'
    exclude group: "commons-logging", module: "commons-logging"
    // enforce 1.1.3, https://www.whitesourcesoftware.com/vulnerability-database/WS-2019-0379
    resolutionStrategy.force "commons-codec:commons-codec:${commons_codec_version}"
    resolutionStrategy.force "com.google.guava:guava:${guava_version}"
}

// updateVersion: Task to auto increment to the next development iteration
task updateVersion {
    onlyIf { System.getProperty('newVersion') }
    doLast {
        ext.newVersion = System.getProperty('newVersion')
        println "Setting version to ${newVersion}."
        // String tokenization to support -SNAPSHOT
        ant.replaceregexp(file:'build.gradle', match: '"opensearch.version", "\\d.*"', replace: '"opensearch.version", "' + newVersion.tokenize('-')[0] + '-SNAPSHOT"', flags:'g', byline:true)
        ant.replaceregexp(match:'"version": "\\d+.\\d+.\\d+.\\d+', replace:'"version": ' + '"' + newVersion.tokenize('-')[0] + '.0', flags:'g', byline:true) {
            fileset(dir: projectDir) {
                include(name: "workbench/package.json")
                include(name: "workbench/opensearch_dashboards.json")
            }
        }
        ant.replaceregexp(file:'workbench/opensearch_dashboards.json', match:'"opensearchDashboardsVersion": "\\d+.\\d+.\\d+', replace:'"opensearchDashboardsVersion": ' + '"' + newVersion.tokenize('-')[0], flags:'g', byline:true)
    }
}
