calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(account_number=[$0], firstname=[$1], address=[$2], balance=[$3], gender=[$4], city=[$5], employer=[$6], state=[$7], age=[$8], email=[$9], lastname=[$10], count()=[$18])
        LogicalJoin(condition=[=($7, $17)], joinType=[left])
          CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
          LogicalAggregate(group=[{0}], count()=[COUNT()])
            LogicalProject(state=[$7])
              LogicalFilter(condition=[IS NOT NULL($7)])
                CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
  physical: |
    EnumerableCalc(expr#0..12=[{inputs}], proj#0..10=[{exprs}], count()=[$t12])
      EnumerableLimit(fetch=[10000])
        EnumerableMergeJoin(condition=[=($7, $11)], joinType=[left])
          EnumerableSort(sort0=[$7], dir0=[ASC])
            EnumerableCalc(expr#0..16=[{inputs}], proj#0..10=[{exprs}])
              CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
          EnumerableSort(sort0=[$0], dir0=[ASC])
            EnumerableAggregate(group=[{7}], count()=[COUNT()])
              EnumerableCalc(expr#0..16=[{inputs}], expr#17=[IS NOT NULL($t7)], proj#0..16=[{exprs}], $condition=[$t17])
                CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
