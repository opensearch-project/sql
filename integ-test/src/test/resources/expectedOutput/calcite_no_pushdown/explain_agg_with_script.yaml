calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(sum=[$2], len=[$0], gender=[$1])
        LogicalAggregate(group=[{0, 1}], sum=[CHECKED_LONG_SUM($2)])
          LogicalProject(len=[CHAR_LENGTH($4)], gender=[$4], $f3=[+($7, 100)])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..1=[{inputs}], expr#2=[CHAR_LENGTH($t0)], sum=[$t1], len=[$t2], gender=[$t0])
        EnumerableAggregate(group=[{0}], sum=[CHECKED_LONG_SUM($1)])
          EnumerableCalc(expr#0..18=[{inputs}], expr#19=[100:BIGINT], expr#20=[+($t7, $t19)], gender=[$t4], $f3=[$t20])
            CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
