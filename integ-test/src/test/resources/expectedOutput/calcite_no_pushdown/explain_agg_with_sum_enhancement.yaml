calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(sum(balance)=[$1], sum(balance + 100)=[$2], sum(balance - 100)=[$3], sum(balance * 100)=[$4], sum(balance / 100)=[$5], gender=[$0])
        LogicalAggregate(group=[{0}], sum(balance)=[CHECKED_LONG_SUM($1)], sum(balance + 100)=[CHECKED_LONG_SUM($2)], sum(balance - 100)=[CHECKED_LONG_SUM($3)], sum(balance * 100)=[CHECKED_LONG_SUM($4)], sum(balance / 100)=[CHECKED_LONG_SUM($5)])
          LogicalProject(gender=[$4], balance=[$7], $f6=[+($7, 100)], $f7=[-($7, 100)], $f8=[*($7, 100)], $f9=[DIVIDE($7, 100)])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..5=[{inputs}], sum(balance)=[$t1], sum(balance + 100)=[$t2], sum(balance - 100)=[$t3], sum(balance * 100)=[$t4], sum(balance / 100)=[$t5], gender=[$t0])
        EnumerableAggregate(group=[{0}], sum(balance)=[CHECKED_LONG_SUM($1)], sum(balance + 100)=[CHECKED_LONG_SUM($2)], sum(balance - 100)=[CHECKED_LONG_SUM($3)], sum(balance * 100)=[CHECKED_LONG_SUM($4)], sum(balance / 100)=[CHECKED_LONG_SUM($5)])
          EnumerableCalc(expr#0..18=[{inputs}], expr#19=[100:BIGINT], expr#20=[+($t7, $t19)], expr#21=[-($t7, $t19)], expr#22=[*($t7, $t19)], expr#23=[100], expr#24=[DIVIDE($t7, $t23)], gender=[$t4], balance=[$t7], $f6=[$t20], $f7=[$t21], $f8=[$t22], $f9=[$t24])
            CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
