name: Auto-close duplicate issues

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  auto-close-duplicates:
    uses: qianheng-aws/opensearch-build/.github/workflows/issue-dedupe.yml@add-issue-dedupe-workflow
    permissions:
      issues: write
    with:
      mode: 'auto-close'
      grace_days: ${{ vars.DUPLICATE_GRACE_DAYS || '7' }}
