setup:
  - do:
      query.settings:
        body:
          transient:
            plugins.calcite.enabled: true
  - do:
      indices.create:
        index: bounty-types
        body:
          mappings:
            properties:
              "int_field":
                type: integer
              "double_field":
                type: double
  - do:
      bulk:
        index: bounty-types
        refresh: true
        body:
          - '{"index": {"_id": "1"}}'
          - '{"int_field": 2147483647, "double_field": 1.7976931348623157E308}'

---
teardown:
  - do:
      query.settings:
        body:
          transient:
            plugins.calcite.enabled: false

---
"Double overflow to Infinity returns null instead of crashing":
  - skip:
      features:
        - headers
        - allowed_warnings
  - do:
      allowed_warnings:
        - 'Loading the fielddata on the _id field is deprecated and will be removed in future versions. If you require sorting or aggregating on this field you should also include the id in the body of your documents, and map this field as a keyword field that has [doc_values] enabled'
      headers:
        Content-Type: 'application/json'
      ppl:
        body:
          query: source=bounty-types | where int_field = 2147483647 | eval double_mul = double_field * 2 | fields double_field, double_mul

  - match: { total: 1 }
  - match: { "datarows": [[1.7976931348623157E308, null]] }
