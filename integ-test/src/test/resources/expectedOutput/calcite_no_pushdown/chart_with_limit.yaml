calcite:
  logical: |
    LogicalSystemLimit(sort0=[$0], dir0=[ASC], fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalSort(sort0=[$0], dir0=[ASC])
        LogicalAggregate(group=[{0, 1}], avg(balance)=[AVG($2)])
          LogicalProject(state=[$9], gender=[$4], balance0=[CAST($7):DOUBLE])
            LogicalFilter(condition=[AND(IS NOT NULL($9), IS NOT NULL($7))])
              CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableSort(sort0=[$0], dir0=[ASC])
        EnumerableCalc(expr#0..3=[{inputs}], expr#4=[0], expr#5=[=($t3, $t4)], expr#6=[null:DOUBLE], expr#7=[CASE($t5, $t6, $t2)], expr#8=[/($t7, $t3)], proj#0..1=[{exprs}], avg(balance)=[$t8])
          EnumerableAggregate(group=[{0, 1}], agg#0=[$SUM0($2)], agg#1=[COUNT($2)])
            EnumerableCalc(expr#0..18=[{inputs}], expr#19=[CAST($t7):DOUBLE], expr#20=[IS NOT NULL($t9)], expr#21=[IS NOT NULL($t7)], expr#22=[AND($t20, $t21)], state=[$t9], gender=[$t4], balance0=[$t19], $condition=[$t22])
              CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
