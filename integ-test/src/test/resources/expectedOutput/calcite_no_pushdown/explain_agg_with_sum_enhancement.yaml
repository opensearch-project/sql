calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(sum(balance)=[CHECKED_LONG_NARROW($1)], sum(balance + 100)=[$2], sum(balance - 100)=[$3], sum(balance * 100)=[$4], sum(balance / 100)=[$5], gender=[$0])
        LogicalAggregate(group=[{0}], sum(balance)=[SUM($1)], sum(balance + 100)=[SUM($2)], sum(balance - 100)=[SUM($3)], sum(balance * 100)=[SUM($4)], sum(balance / 100)=[SUM($5)])
          LogicalProject(gender=[$4], balance4=[CAST($7):DECIMAL(38, 0)], $f7=[+($7, 100)], $f8=[-($7, 100)], $f9=[*($7, 100)], $f10=[DIVIDE($7, 100)])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..4=[{inputs}], expr#5=[CHECKED_LONG_NARROW($t1)], expr#6=[100:BIGINT], expr#7=[*($t3, $t6)], expr#8=[+($t2, $t7)], expr#9=[-($t2, $t7)], expr#10=[*($t2, $t6)], sum(balance)=[$t5], sum(balance + 100)=[$t8], sum(balance - 100)=[$t9], sum(balance * 100)=[$t10], sum(balance / 100)=[$t4], gender=[$t0])
        EnumerableAggregate(group=[{0}], sum(balance)=[SUM($1)], sum(balance + 100)_SUM=[SUM($3)], sum(balance + 100)_COUNT=[COUNT($3)], sum(balance / 100)=[SUM($2)])
          EnumerableCalc(expr#0..18=[{inputs}], expr#19=[CAST($t7):DECIMAL(38, 0)], expr#20=[100], expr#21=[DIVIDE($t7, $t20)], gender=[$t4], balance=[$t19], $f5=[$t21], balance0=[$t7])
            CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
