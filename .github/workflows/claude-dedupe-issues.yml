name: Claude Issue Dedupe

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to check for duplicates'
        required: true
        type: string

jobs:
  dedupe:
    uses: qianheng-aws/opensearch-build/.github/workflows/issue-dedupe-detect.yml@add-issue-dedupe-workflow
    permissions:
      contents: read
      issues: write
      id-token: write
    secrets:
      BEDROCK_ACCESS_ROLE: ${{ secrets.BEDROCK_ACCESS_ROLE }}
    with:
      grace_days: ${{ vars.DUPLICATE_GRACE_DAYS || '7' }}
