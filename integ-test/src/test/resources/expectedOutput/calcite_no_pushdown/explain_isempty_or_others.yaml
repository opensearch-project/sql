calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(account_number=[$0], firstname=[$1], address=[$2], balance=[$3], gender=[$4], city=[$5], employer=[$6], state=[$7], age=[$8], email=[$9], lastname=[$10])
        LogicalFilter(condition=[OR(=($4, 'M'), SEARCH($1, Sarg[''; NULL AS TRUE]:CHAR(0)))])
          CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..16=[{inputs}], expr#17=['M'], expr#18=[=($t4, $t17)], expr#19=[Sarg[''; NULL AS TRUE]:CHAR(0)], expr#20=[SEARCH($t1, $t19)], expr#21=[OR($t18, $t20)], proj#0..10=[{exprs}], $condition=[$t21])
        CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
